{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Add Coupon</title>
    <!-- plugins:css -->
    <link rel="stylesheet" href="{% static 'admin/vendors/mdi/css/materialdesignicons.min.css' %}">
    <link rel="stylesheet" href="{% static 'admin/vendors/css/vendor.bundle.base.css' %}">
    <!-- endinject -->
    <!-- inject:css -->
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
    <!-- End layout styles -->
    <link rel="shortcut icon" href="{% static 'admin/images/favicon.png' %}">
  </head>
  <body>
    <div class="container-scroller">
      {% include 'admin/sidebar.html' %}
      <div class="container-fluid page-body-wrapper">
        {% include 'admin/navbar.html' %}
        <div class="main-panel">
          <div class="content-wrapper">
            <div class="row">
              <div class="col-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Add New Coupon</h4>
                    {% if messages %}
                      {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                      {% endfor %}
                    {% endif %}
                    <form method="POST" action="{% url 'add_coupon' %}">
                      {% csrf_token %}
                      <div class="form-group">
                        <label for="code">Coupon Code</label>
                        <input type="text" class="form-control" id="code" name="code" maxlength="30" required>
                      </div>
                      <div class="form-group">
                        <label for="discount_value">Discount Value</label>
                        <input type="number" step="0.01" class="form-control" id="discount_value" name="discount_value" max="9999999999" required>
                      </div>
                      <div class="form-group">
                        <label for="min_purchase_amount">Minimum Purchase Amount</label>
                        <input type="number" step="0.01" class="form-control" id="min_purchase_amount" name="min_purchase_amount" max="9999999999" value="0.00" required>
                      </div>
                      <div class="form-group">
                        <label for="valid_from">Valid From</label>
                        <input type="date" class="form-control datepicker" id="valid_from" name="valid_from" required>
                      </div>
                      <div class="form-group">
                        <label for="valid_to">Valid To</label>
                        <input type="date" class="form-control datepicker" id="valid_to" name="valid_to" required>
                      </div>
                      <div class="form-group">
                        <label for="usage_limit">Usage Limit</label>
                        <input type="number" class="form-control" id="usage_limit" name="usage_limit" min="1" value="1" required>
                      </div>
                      <div class="form-footer">
                        <a href="{% url 'coupon_management' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Create Coupon</button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="{% static 'admin/vendors/js/vendor.bundle.base.js' %}"></script>
    <script src="{% static 'admin/js/off-canvas.js' %}"></script>
    <script src="{% static 'admin/js/hoverable-collapse.js' %}"></script>
    <script src="{% static 'admin/js/misc.js' %}"></script>
  </body>
</html>
